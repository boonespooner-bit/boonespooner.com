<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boone Spooner - Music, Design and Product</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .container {
      text-align: center;
      user-select: none;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 200;
      letter-spacing: 0.18em;
      color: transparent;
      -webkit-text-stroke: 1.5px #c0b8d8;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.4em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1.15rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #bbb;
    }

    .subtitle a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .subtitle a:hover {
      color: #9990c0;
    }

    .sep {
      margin: 0 0.5em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Boone Spooner</h1>
    <p class="subtitle">
      <a href="/music-reel/">reel</a>
      <span class="sep">|</span>
      <a href="/portfolio/">design</a>
      <span class="sep">|</span>
      <a href="https://open.spotify.com/artist/6SIIdiMFuPQ2LXSYsS6Jdl" target="_blank" rel="noopener">spotify</a>
    </p>
  </div>
</body>
</html>
